<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CJ SmartCargo TMS</title>
    
    <link rel="stylesheet" href="assets/css/password.css">
    
    <style>
        /* 2. 内部样式只保留布局，不要在这里写 body 背景，否则会覆盖外部 CSS 的图片 */
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            /* background: #f0f2f5;  <-- 如果 CSS 里有图，必须删掉这一行 */
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.9); /* 设置半透明白色，能看到背景图 */
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 320px; 
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1e63d8; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #164eb5; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 id="loginTitle">TMS System Login</h2>
    <input type="text" id="username" placeholder="Username / 账号">
    <input type="password" id="pwd" placeholder="Password / 密码">
    <button onclick="login()">Login</button>
    <p id="msg" style="color:red; font-size:14px; margin-top:10px;"></p>
</div>

<script>
async function login() {
    const userVal = document.getElementById("username").value;
    const pwdVal = document.getElementById("pwd").value;
    const msgEl = document.getElementById("msg");

    if(!userVal || !pwdVal) {
        msgEl.textContent = "Please enter both fields";
        return;
    }

    try {
        const response = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: userVal, password: pwdVal })
        });

        const result = await response.json();

        if (result.success) {
            localStorage.setItem("tms_auth", result.token);
            localStorage.setItem("tms_role", result.role);
            const url = new URL(location.href);
            const next = url.searchParams.get("redirect") || "index.html";
            window.location.href = next;
        } else {
            msgEl.textContent = "Invalid username or password";
        }
    } catch (error) {
        msgEl.textContent = "Server Connection Failed";
    }
}
</script>
</body>
</html>
