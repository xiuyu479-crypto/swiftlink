<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GPS 车辆追踪系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .icon-box {
            font-size: 50px;
            color: #1e63d8;
            margin-bottom: 20px;
        }

        h2 { color: #333; margin: 10px 0; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        /* 进入 GPS 按钮 */
        .btn-main {
            background-color: #1e63d8;
            color: white;
            box-shadow: 0 4px 12px rgba(30, 99, 216, 0.3);
        }

        .btn-main:hover {
            background-color: #164eb0;
            transform: translateY(-2px);
        }

        /* 返回首页按钮 */
        .btn-outline {
            background-color: transparent;
            color: #666;
            border: 1px solid #ddd;
        }

        .btn-outline:hover {
            background-color: #f8f9fa;
            border-color: #bbb;
        }

        .notice {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-box">📍</div>
    <h2>GPS 车辆实时追踪</h2>
    <p>点击下方按钮启动追踪系统。首次访问请在弹出窗口中登录，系统将自动记录您的登录凭据。</p>

    <div class="btn-group">
        <a href="https://app.ifleet.africa/#/login" class="btn btn-main">
            立即进入地图界面
        </a>
        
        <a href="index.html" class="btn btn-outline">
            返回系统主页
        </a>
    </div>

    <div class="notice">
        提示：若已登录且勾选“记住我”，将直接显示实时地图。
    </div>
</div>

</body>
</html>
